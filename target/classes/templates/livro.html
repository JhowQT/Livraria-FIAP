<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Livros</title>
</head>
<body>

<h1>Lista de Livros</h1>

<a th:href="@{/livros/novo}">Novo Livro</a>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Título</th>
            <th>Autor</th>
            <th>Editora</th>
            <th>Preço</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="livro : ${livros}">
            <td th:text="${livro.id}"></td>
            <td th:text="${livro.titulo}"></td>
            <td th:text="${livro.autor}"></td>
            <td th:text="${livro.editora}"></td>
            <td th:text="${livro.preco}"></td>
        </tr>
    </tbody>
</table>

</body>
</html>
