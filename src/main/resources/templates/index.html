<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head th:fragment="head">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">

<script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>

<title>Biblioteca</title>
</head>

<body>

	<!-- 🔝 HEADER -->
	<header th:fragment="header">
		<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
			<div class="container">
				<a class="navbar-brand" href="/">
					📚 Biblioteca
				</a>

				<button class="navbar-toggler" type="button"
					data-bs-toggle="collapse"
					data-bs-target="#navbarSupportedContent">
					<span class="navbar-toggler-icon"></span>
				</button>

				<div class="collapse navbar-collapse" id="navbarSupportedContent">
					<ul class="navbar-nav me-auto mb-2 mb-lg-0">

						<li class="nav-item">
							<a class="nav-link active" href="/">Home</a>
						</li>

						<li class="nav-item">
							<a class="nav-link" href="/jogos">Jogos</a>
						</li>

						<li class="nav-item">
							<a class="nav-link" href="/livros">Livros</a>
						</li>

					</ul>
				</div>
			</div>
		</nav>
	</header>

	<!-- 🧠 DASHBOARD -->
	<div class="container py-3" style="margin-top: 60px;">

		<div class="d-flex justify-content-center align-items-center">
			<h2 class="fw-light text-uppercase pb-2">
				Admin da Biblioteca
			</h2>
		</div>

		<div class="row py-3">

			<!-- 🎮 JOGOS -->
			<div class="col-sm-6">
				<h1 class="text-center fw-normal text-success display-1"
					th:text="${qtdJogos}">
				</h1>

				<h2 class="text-center fw-normal">Jogos</h2>
			</div>

			<!-- 📚 LIVROS -->
			<div class="col-sm-6">
				<h1 class="text-center fw-normal text-success display-1"
					th:text="${qtdLivros}">
				</h1>

				<h2 class="text-center fw-normal">Livros</h2>
			</div>

		</div>

	</div>

	<!-- 🔻 FOOTER -->
	<footer th:fragment="footer"
		class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top fixed-bottom container">

		<p class="col-md-4 mb-0 text-muted">
			© 2026 Biblioteca
		</p>

		<ul class="nav col-md-4 justify-content-end">

			<li class="nav-item">
				<a href="/" class="nav-link px-2 text-muted">Home</a>
			</li>

			<li class="nav-item">
				<a href="/jogos" class="nav-link px-2 text-muted">Jogos</a>
			</li>

			<li class="nav-item">
				<a href="/livros" class="nav-link px-2 text-muted">Livros</a>
			</li>

		</ul>

	</footer>

</body>
</html>
